<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cambridge English–Vietnamese Search</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<form id="cambridge-widget">

<input type="hidden" name="utm_source" value="widget_searchbox_source">
<input type="hidden" name="utm_medium" value="widget_searchbox">
<input type="hidden" name="utm_campaign" value="widget_tracking">

<table class="cambridge">

<tr>

<td colspan="2" class="logo">

<a
href="https://dictionary.cambridge.org/vi/dictionary/english-vietnamese/"
target="_blank">

<img
src="https://dictionary.cambridge.org/external/images/freesearch/sbl.png?version=6.0.80"
alt="Cambridge Dictionary">

</a>

</td>

</tr>

<tr>

<td class="search-cell">

<input
id="search"
type="search"
placeholder="Search English–Vietnamese"
autocomplete="off"
required>

</td>

<td class="button-cell">

<button type="submit">

<img
src="https://dictionary.cambridge.org/external/images/freesearch/search.png?version=6.0.80"
alt="Search">

</button>

</td>

</tr>

</table>

</form>

<script src="script.js"></script>

</body>
</html>
